# À installer côté proxy Squid, pas sur la station.
# Adapter l'IP source de la station blanche.

acl station_blanche src 192.168.50.10
acl vt dstdomain .virustotal.com
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access deny !station_blanche
http_access deny !SSL_ports
http_access allow station_blanche CONNECT vt
http_access deny all

access_log /var/log/squid/station-blanche-access.log
